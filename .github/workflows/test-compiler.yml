name: Test Compiler

on:
  workflow_dispatch:
    inputs:
      rc_url:
        description: "RC origin (override for staging RC)"
        required: false
        default: "https://rc.lilylabs.io"
        type: string

  schedule:
    - cron: '0 2 * * *'   # nightly um 02:00 UTC

  push:
    branches: [main]
    paths:
      - 'testbench/**'
      - 'scripts/**'
      - '.github/workflows/**'

concurrency:
  group: test-compiler-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

env:
  # Vollständige C+C++ Benchmark-Suite — jeder Trigger fährt alles
  ALL_SUITES: "c-brick,cpp-brick,brick-format,realworld-build,c-testsuite,gcc-torture,gcc-dg-cpp,llvm-single"
  ALL_PLUGINS: "c cpp brick-format"

jobs:
  test:
    name: Full C/C++ benchmark against latest RC
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq zstd curl ca-certificates

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: testbench/package.json

      - name: Install lly + plugins from RC (via OIDC)
        id: install
        run: |
          chmod +x scripts/install-from-rc.sh
          scripts/install-from-rc.sh
        env:
          LLY_RC_URL:      ${{ inputs.rc_url || 'https://rc.lilylabs.io' }}
          LLY_INSTALL_DIR: ${{ github.workspace }}/bin
          PLUGINS:         ${{ env.ALL_PLUGINS }}
          OIDC_AUDIENCE:   "rc.lilylabs.io"

      - name: Add bin to PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Restore corpora cache
        uses: actions/cache@v4
        with:
          path: testbench/.data
          key: corpora-v1-${{ hashFiles('testbench/testbench.ci.json') }}
          restore-keys: |
            corpora-v1-

      - name: Install testbench dependencies
        working-directory: testbench
        run: npm install

      - name: Run full C/C++ benchmark suite
        id: tests
        run: |
          chmod +x scripts/run-suites.sh
          scripts/run-suites.sh "${{ env.ALL_SUITES }}"
        continue-on-error: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: |
            results/
            testbench/output/
            bin/version.json
          retention-days: 90

      - name: Commit result summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RESULT_FILE="results/$DATE.json"
          if [ -f results/run-summary.json ]; then
            jq -s '.[0] + .[1]' bin/version.json results/run-summary.json > "$RESULT_FILE"
            git config user.name  "compiler-test-bot"
            git config user.email "bot@lilylabs.dev"
            git add "$RESULT_FILE"
            git commit -m "C/C++ benchmark run $DATE (lly=$(jq -r '.lly_version' bin/version.json))" || echo "no changes"
            git push || echo "push failed (no commits)"
          fi

      - name: Update README badges
        run: |
          if [ -f scripts/update-badges.sh ]; then
            chmod +x scripts/update-badges.sh
            scripts/update-badges.sh
            git add README.md
            git diff --cached --quiet || {
              git commit -m "update badges $(date -u +%Y-%m-%d)" || true
              git push || true
            }
          fi

      - name: Fail if any suite failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::One or more test suites failed — see logs"
          exit 1

  deploy-pages:
    name: Deploy trend page
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
