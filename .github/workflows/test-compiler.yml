name: Test Compiler

on:
  workflow_dispatch:
    inputs:
      suites:
        description: "Comma-separated suite IDs (or 'all')"
        required: false
        default: "c-brick,cpp-brick,brick-format,realworld-build"
        type: string
      plugins:
        description: "Plugins to install via lly plugin install (space-separated)"
        required: false
        default: "c cpp nextjs deploy brick-format"
        type: string
      rc_url:
        description: "RC origin (default: https://rc.lilylabs.io)"
        required: false
        default: "https://rc.lilylabs.io"
        type: string

  schedule:
    # Nightly volle Suite um 02:00 UTC
    - cron: '0 2 * * *'

  push:
    branches: [main]
    paths:
      - 'testbench/**'
      - 'scripts/**'
      - '.github/workflows/**'

# Verhindert parallele Runs auf demselben Branch
concurrency:
  group: test-compiler-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write    # results/<date>.json committen
  issues: write      # Auto-Issues bei Regressions

jobs:
  test:
    name: Test latest compiler from RC
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      # ─── Checkout dieses Repos ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── System-Dependencies ────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            jq \
            zstd \
            curl \
            ca-certificates

      # ─── Node-Toolchain ─────────────────────────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: testbench/package.json

      # ─── lly + Plugins von RC pullen ────────────────────────
      - name: Install lly + plugins from RC
        id: install
        run: |
          chmod +x scripts/install-from-rc.sh
          scripts/install-from-rc.sh
        env:
          LLY_RC_URL:      ${{ inputs.rc_url || 'https://rc.lilylabs.io' }}
          LLY_INSTALL_DIR: ${{ github.workspace }}/bin
          PLUGINS:         ${{ inputs.plugins || 'c cpp nextjs deploy brick-format' }}

      - name: Add bin to PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      # ─── External Test-Korpora-Cache ────────────────────────
      - name: Restore corpora cache
        uses: actions/cache@v4
        with:
          path: testbench/.data
          key: corpora-v1-${{ hashFiles('testbench/testbench.ci.json') }}
          restore-keys: |
            corpora-v1-

      # ─── npm install ────────────────────────────────────────
      - name: Install testbench dependencies
        working-directory: testbench
        run: npm install

      # ─── Run Suites ─────────────────────────────────────────
      - name: Run test suites
        id: tests
        run: |
          chmod +x scripts/run-suites.sh
          scripts/run-suites.sh "${{ inputs.suites || 'c-brick,cpp-brick,brick-format,realworld-build' }}"
        continue-on-error: true

      # ─── Report als Artefakt ────────────────────────────────
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: |
            results/
            testbench/output/
            bin/version.json
          retention-days: 90

      # ─── Result-JSON ins Repo committen ─────────────────────
      - name: Commit result summary
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RESULT_FILE="results/$DATE.json"
          if [ -f results/run-summary.json ]; then
            # combine version + summary into the date-stamped file
            jq -s '.[0] + .[1]' bin/version.json results/run-summary.json > "$RESULT_FILE"
            git config user.name  "compiler-test-bot"
            git config user.email "bot@lilylabs.dev"
            git add "$RESULT_FILE"
            git commit -m "test run $DATE (lly $(jq -r '.lly_version' bin/version.json))" || echo "no changes"
            git push || echo "push failed (likely no commits)"
          fi

      # ─── Final: bei Test-Fail Workflow als Fail markieren ──
      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::One or more test suites failed"
          exit 1
